<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&amp;display=swap');
      .mono { font-family: 'Source Code Pro', 'Courier New', monospace; }
    </style>
  </defs>
  <!-- Terminal window background -->
  <rect width="400" height="200" rx="8" ry="8" fill="#0a0f0c"/>
  <!-- Traffic light dots -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="38" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="56" cy="18" r="6" fill="#27c93f"/>
  <!-- Separator line -->
  <line x1="0" y1="34" x2="400" y2="34" stroke="#1a3a2a" stroke-width="1"/>
  <!-- Prompt line -->
  <text x="16" y="62" class="mono" fill="#4a8a6a" font-size="14" font-weight="400">~/packetpursuit $</text>
  <rect x="168" y="49" width="9" height="17" fill="#00e5c0" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- PACKET PURSUIT -->
  <text x="200" y="110" class="mono" text-anchor="middle" font-size="42" font-weight="700" letter-spacing="6">
    <tspan fill="#e8fff8">PACKET</tspan>
  </text>
  <text x="200" y="148" class="mono" text-anchor="middle" font-size="42" font-weight="700" letter-spacing="6">
    <tspan fill="#00e5c0">PURSUIT</tspan>
  </text>
  <!-- Bottom line -->
  <text x="200" y="180" class="mono" text-anchor="middle" fill="#4a8a6a" font-size="11" letter-spacing="1">
    recon | exploit &amp;&amp; defend | repeat &gt;&gt; theGrind.log
  </text>
</svg>
